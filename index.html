<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Marché Pro">
    
    <!-- ICÔNE PWA -->
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgdmlld0JveD0iMCAwIDUxMiA1MTIiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjUxMiIgaGVpZ2h0PSI1MTIiIHJ4PSIxMjAiIGZpbGw9IiNmOTczMTYiLz48dGV4dCB4PSIyNjUiIHk9IjMyNSIgZm9udC1mYW1pbHk9IkludGVyLCBzYW5zLXNlcmlmIiBmb250LXdlaWdodD0iOTAwIiBmb250LXNpemU9IjI4MCIgZmlsbD0iYmxhY2siIHRleHQtYW5jaG9yPSJtaWRkbGUiIG9wYWNpdHk9IjAuNSI+TTwvdGV4dD48dGV4dCB4PSIyNTUiIHk9IjMxNSIgZm9udC1mYW1pbHk9IkludGVyLCBzYW5zLXNlcmlmIiBmb250LXdlaWdodD0iOTAwIiBmb250LXNpemU9IjI4MCIgZmlsbD0id2hpdGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiPk08L3RleHQ+PC9zdmc+">

    <title>Marché Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #050505; color: white; -webkit-tap-highlight-color: transparent; margin: 0; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #f97316; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #error-overlay { position: fixed; top: 0; left: 0; width: 100%; padding: 20px; background: #cc0000; color: white; font-size: 13px; z-index: 9999; display: none; text-align: center; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body>
    <div id="error-overlay"></div>
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px;">
            <div class="loader"></div>
            <p style="color: #666; font-size: 14px;">Tentative de connexion...</p>
            <div id="help-msg" style="display:none; text-align:center; padding: 0 40px; color: #444; font-size: 11px;">
                Si rien ne se passe, vérifiez que vous avez bien créé la base "Cloud Firestore" dans votre console Firebase.
            </div>
        </div>
    </div>

    <script type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import * as Lucide from 'https://esm.sh/lucide-react@0.284.0';
        import { initializeApp } from 'https://esm.sh/firebase@10.4.0/app';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://esm.sh/firebase@10.4.0/auth';
        import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy, doc, deleteDoc, updateDoc } from 'https://esm.sh/firebase@10.4.0/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyAXmSV5CPO7yh8YiY5Nd4SyLdiFFeNU2ns",
            authDomain: "manager-marche-sj.firebaseapp.com",
            projectId: "manager-marche-sj",
            storageBucket: "manager-marche-sj.firebasestorage.app",
            messagingSenderId: "28175692353",
            appId: "1:28175692353:web:b1a704af8b0bb5ace34cc0",
            measurementId: "G-L1XXS2SKDE"
        };

        const logError = (msg) => {
            const overlay = document.getElementById('error-overlay');
            overlay.style.display = 'block';
            overlay.innerHTML = "<strong>ERREUR :</strong> " + msg;
        };

        setTimeout(() => { document.getElementById('help-msg').style.display = 'block'; }, 6000);

        let db, auth, provider;
        try {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            provider = new GoogleAuthProvider();
            // On essaie d'initialiser Firestore avec un délai
            db = getFirestore(app);
        } catch (e) { logError("Initialisation : " + e.message); }

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [entries, setEntries] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [formData, setFormData] = useState({ marketName: '', date: new Date().toISOString().split('T')[0], cashGains: 0, cardGains: 0, expenses: 0 });

            useEffect(() => {
                if (!auth) return;
                return onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                }, (err) => logError("Auth : " + err.message));
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                try {
                    const q = query(collection(db, 'markets'), where('uid', '==', user.uid), orderBy('date', 'desc'));
                    const unsub = onSnapshot(q, (snap) => {
                        setEntries(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    }, (err) => {
                        console.error(err);
                        if (err.message.includes('available') || err.message.includes('permission')) {
                            logError("Firestore n'est pas prêt. Vérifiez : 1. Base 'Cloud Firestore' créée ? 2. Mode 'Test' activé ?");
                        }
                    });
                    return unsub;
                } catch (e) { console.error(e); }
            }, [user]);

            const handleLogin = async () => {
                try {
                    await signInWithPopup(auth, provider);
                } catch (e) {
                    logError("Connexion impossible. Avez-vous ajouté 'seanj0606.github.io' dans les domaines autorisés de Firebase ?");
                }
            };

            if (loading) return React.createElement('div', { className: "h-screen flex items-center justify-center" }, React.createElement('div', { className: "loader" }));

            if (!user) return React.createElement('div', { className: "h-screen flex flex-col items-center justify-center p-6 text-center" },
                React.createElement('h1', { className: "text-4xl font-black text-orange-500 mb-2" }, "MARCHÉ MANAGER"),
                React.createElement('p', { className: "text-gray-500 mb-8" }, "Gérez vos marchés en temps réel"),
                React.createElement('button', { onClick: handleLogin, className: "bg-white text-black px-8 py-4 rounded-2xl font-bold flex items-center gap-3" }, "Se connecter avec Google")
            );

            return React.createElement('div', { className: "max-w-md mx-auto p-4 pb-24" },
                React.createElement('header', { className: "flex justify-between items-center mb-8" },
                    React.createElement('div', null,
                        React.createElement('h1', { className: "text-xl font-black text-orange-500" }, "MARCHÉ MANAGER"),
                        React.createElement('p', { className: "text-[10px] text-gray-500 font-bold uppercase" }, user.displayName)
                    ),
                    React.createElement('button', { onClick: () => signOut(auth), className: "p-2 bg-white/5 rounded-xl" }, React.createElement(Lucide.LogOut, { size: 20 }))
                ),
                
                activeTab === 'dashboard' && React.createElement('div', { className: "space-y-6" },
                    React.createElement('div', { className: "grid grid-cols-2 gap-4" },
                        React.createElement('div', { className: "glass p-5 rounded-3xl" },
                            React.createElement('p', { className: "text-[10px] text-gray-500 font-bold mb-1" }, "TOTAL GAINS"),
                            React.createElement('p', { className: "text-2xl font-black text-orange-500" }, entries.reduce((acc, e) => acc + (e.cashGains || 0) + (e.cardGains || 0), 0).toFixed(0), "€")
                        ),
                        React.createElement('div', { className: "glass p-5 rounded-3xl" },
                            React.createElement('p', { className: "text-[10px] text-gray-500 font-bold mb-1" }, "MARCHÉS"),
                            React.createElement('p', { className: "text-2xl font-black" }, entries.length)
                        )
                    ),
                    React.createElement('div', { className: "space-y-4" },
                        React.createElement('h3', { className: "text-xs font-bold text-gray-500 uppercase" }, "Dernières Activités"),
                        entries.length > 0 ? entries.slice(0, 5).map(e => React.createElement('div', { key: e.id, className: "glass p-4 rounded-2xl flex justify-between items-center" },
                            React.createElement('div', null,
                                React.createElement('p', { className: "font-bold" }, e.marketName),
                                React.createElement('p', { className: "text-[10px] text-gray-500" }, e.date)
                            ),
                            React.createElement('p', { className: "font-bold text-orange-500" }, (e.cashGains + e.cardGains).toFixed(0), "€")
                        )) : React.createElement('p', { className: "text-center text-gray-600 py-10" }, "Aucune donnée trouvée")
                    )
                ),

                activeTab === 'form' && React.createElement('div', { className: "space-y-6" },
                    React.createElement('h2', { className: "text-2xl font-black" }, "AJOUTER UN MARCHÉ"),
                    React.createElement('form', { 
                        onSubmit: async (e) => {
                            e.preventDefault();
                            try {
                                await addDoc(collection(db, 'markets'), { ...formData, uid: user.uid, createdAt: new Date().toISOString() });
                                setFormData({ marketName: '', date: new Date().toISOString().split('T')[0], cashGains: 0, cardGains: 0, expenses: 0 });
                                setActiveTab('dashboard');
                            } catch (err) { alert("Erreur Firestore : " + err.message); }
                        }, 
                        className: "space-y-4" 
                    },
                        React.createElement('input', { type: "text", required: true, placeholder: "Nom du Marché", value: formData.marketName, onChange: e => setFormData({...formData, marketName: e.target.value}), className: "w-full glass p-4 rounded-2xl outline-none" }),
                        React.createElement('input', { type: "date", value: formData.date, onChange: e => setFormData({...formData, date: e.target.value}), className: "w-full glass p-4 rounded-2xl outline-none" }),
                        React.createElement('div', { className: "grid grid-cols-2 gap-4" },
                            React.createElement('input', { type: "number", placeholder: "Espèces (€)", value: formData.cashGains || '', onChange: e => setFormData({...formData, cashGains: Number(e.target.value)}), className: "glass p-4 rounded-2xl outline-none" }),
                            React.createElement('input', { type: "number", placeholder: "CB (€)", value: formData.cardGains || '', onChange: e => setFormData({...formData, cardGains: Number(e.target.value)}), className: "glass p-4 rounded-2xl outline-none" })
                        ),
                        React.createElement('button', { type: "submit", className: "w-full bg-orange-500 p-5 rounded-2xl font-bold" }, "ENREGISTRER")
                    )
                ),

                React.createElement('nav', { className: "fixed bottom-6 left-4 right-4 glass rounded-3xl p-2 flex justify-around items-center z-50 shadow-2xl" },
                    [
                        { id: 'dashboard', icon: Lucide.LayoutDashboard },
                        { id: 'form', icon: Lucide.PlusCircle },
                        { id: 'history', icon: Lucide.History }
                    ].map(item => React.createElement('button', { 
                        key: item.id, 
                        onClick: () => setActiveTab(item.id),
                        className: `flex flex-col items-center p-4 rounded-2xl ${activeTab === item.id ? 'bg-orange-500 text-white' : 'text-gray-500'}`
                    }, React.createElement(item.icon, { size: 24 })))
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
