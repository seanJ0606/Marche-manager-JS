<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marché Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        #root { min-height: 100vh; }
        .loader { 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top: 3px solid #f97316; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px;">
            <div class="loader"></div>
            <p style="color: #666; font-size: 14px;">Chargement de Marché Manager...</p>
            <noscript><p style="color: red;">Veuillez activer JavaScript pour utiliser cette application.</p></noscript>
        </div>
    </div>

    <!-- Chargement des bibliothèques via ESM -->
    <script type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import * as Lucide from 'https://esm.sh/lucide-react@0.284.0';
        import { initializeApp } from 'https://esm.sh/firebase@10.4.0/app';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://esm.sh/firebase@10.4.0/auth';
        import { getFirestore, collection, query, where, onSnapshot, orderBy } from 'https://esm.sh/firebase@10.4.0/firestore';

        // === CONFIGURATION FIREBASE (récupérée depuis la console) ===
        const firebaseConfig = {
            apiKey: "AIzaSyAXmSV5CP07yh8YiY5Nd4SyLdiFFeNU2ns",
            authDomain: "manager-marche-sj.firebaseapp.com",
            projectId: "manager-marche-sj",
            storageBucket: "manager-marche-sj.firebasestorage.app",
            messagingSenderId: "28175692353",
            appId: "1:28175692353:web:b1a704af8b0bb5ace34cc0",
            measurementId: "G-L1XXS2SKDE"
        };

        // --- INITIALISATION ---
        let db, auth, provider;

        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
            provider = new GoogleAuthProvider();
        } catch (e) {
            console.error("Erreur Firebase :", e);
            document.getElementById('root').innerHTML = `
                <div style="padding: 40px; text-align: center; color: #ff4444;">
                    <h2 style="margin-bottom: 20px;">Erreur de Configuration</h2>
                    <p>L'application n'a pas pu démarrer.</p>
                    <p style="font-size: 13px; margin-top: 15px;">Vérifiez la console pour plus de détails.</p>
                </div>
            `;
        }

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [entries, setEntries] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');

            useEffect(() => {
                if (!auth) return;
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return unsubscribe;
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const q = query(
                    collection(db, 'markets'), 
                    where('uid', '==', user.uid), 
                    orderBy('date', 'desc')
                );
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    setEntries(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return unsubscribe;
            }, [user]);

            if (loading) {
                return React.createElement('div', { 
                    className: "h-screen flex items-center justify-center" 
                }, React.createElement('div', { className: "loader" }));
            }

            if (!user) {
                return React.createElement('div', { 
                    className: "h-screen flex flex-col items-center justify-center p-6 text-center" 
                },
                    React.createElement('h1', { 
                        className: "text-4xl font-black text-orange-500 mb-2" 
                    }, "MARCHÉ MANAGER"),
                    React.createElement('p', { 
                        className: "text-gray-500 mb-8" 
                    }, "Connectez-vous pour gérer vos marchés"),
                    React.createElement('button', { 
                        onClick: () => signInWithPopup(auth, provider),
                        className: "bg-white text-black px-8 py-4 rounded-2xl font-bold flex items-center gap-3 hover:bg-gray-100 transition"
                    }, 
                        React.createElement('span', null, "Se connecter avec Google")
                    )
                );
            }

            return React.createElement('div', { className: "max-w-md mx-auto p-4 pb-24" },
                // Header
                React.createElement('header', { className: "flex justify-between items-center mb-8" },
                    React.createElement('div', null,
                        React.createElement('h1', { 
                            className: "text-xl font-black text-orange-500" 
                        }, "MARCHÉ MANAGER"),
                        React.createElement('p', { 
                            className: "text-[10px] text-gray-500 font-bold uppercase" 
                        }, user.displayName || user.email)
                    ),
                    React.createElement('button', { 
                        onClick: () => signOut(auth), 
                        className: "p-2 bg-white/5 rounded-xl hover:bg-white/10 transition" 
                    }, 
                        React.createElement(Lucide.LogOut, { size: 20 })
                    )
                ),

                // Dashboard
                activeTab === 'dashboard' && React.createElement('div', { className: "space-y-6" },
                    React.createElement('div', { className: "grid grid-cols-2 gap-4" },
                        React.createElement('div', { className: "glass p-5 rounded-3xl" },
                            React.createElement('p', { className: "text-[10px] text-gray-500 font-bold mb-1" }, "TOTAL GAINS"),
                            React.createElement('p', { 
                                className: "text-2xl font-black text-orange-500" 
                            }, 
                                entries.reduce((acc, e) => acc + (e.cashGains || 0) + (e.cardGains || 0), 0) + " €"
                            )
                        ),
                        React.createElement('div', { className: "glass p-5 rounded-3xl" },
                            React.createElement('p', { className: "text-[10px] text-gray-500 font-bold mb-1" }, "MARCHÉS"),
                            React.createElement('p', { 
                                className: "text-2xl font-black" 
                            }, entries.length)
                        )
                    ),
                    React.createElement('div', { className: "space-y-4" },
                        React.createElement('h3', { 
                            className: "text-xs font-bold text-gray-500 uppercase" 
                        }, "Dernières Activités"),
                        ...entries.slice(0, 5).map(e => 
                            React.createElement('div', { 
                                key: e.id, 
                                className: "glass p-4 rounded-2xl flex justify-between items-center" 
                            },
                                React.createElement('div', null,
                                    React.createElement('p', { className: "font-bold" }, e.marketName || "Marché"),
                                    React.createElement('p', { className: "text-[10px] text-gray-500" }, e.date || "")
                                ),
                                React.createElement('p', { 
                                    className: "font-bold text-orange-500" 
                                }, 
                                    ((e.cashGains || 0) + (e.cardGains || 0)).toFixed(0) + " €"
                                )
                            )
                        )
                    )
                ),

                // Navigation
                React.createElement('nav', { 
                    className: "fixed bottom-6 left-4 right-4 glass rounded-3xl p-2 flex justify-around items-center" 
                },
                    [
                        { id: 'dashboard', icon: Lucide.LayoutDashboard, label: 'Accueil' },
                        { id: 'history', icon: Lucide.History, label: 'Journal' }
                    ].map(item => 
                        React.createElement('button', { 
                            key: item.id, 
                            onClick: () => setActiveTab(item.id),
                            className: `flex flex-col items-center p-3 rounded-2xl transition ${activeTab === item.id ? 'bg-orange-500 text-white' : 'text-gray-500 hover:text-white'}`
                        }, 
                            React.createElement(item.icon, { size: 20 }),
                            React.createElement('span', { className: "text-[10px] mt-1" }, item.label)
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
