    <script type="module">
        import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
            LayoutDashboard, PlusCircle, History, LogOut, TrendingUp, MapPin, Cloud, Sun, CloudRain, 
            CloudLightning, Wind, Euro, Clock, Star, Trash2, ChevronRight, Search, Map as MapIcon,

        } from 'https://esm.sh/firebase@10.4.0/firestore';

        // --- CONFIGURATION FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyAXmSV5CPO7yh8YiY5Nd4SyLdiFFeNU2ns",
            authDomain: "manager-marche-sj.firebaseapp.com",
            projectId: "manager-marche-sj",
            storageBucket: "manager-marche-sj.firebasestorage.app",
            messagingSenderId: "28175692353",
            appId: "1:28175692353:web:b1a704af8b0bb5ace34cc0",
            measurementId: "G-L1XXS2SKDE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const cn = (...classes) => classes.filter(Boolean).join(' ');

        const WeatherIcon = ({ type, className }) => {
            const icons = { 'Soleil': Sun, 'Nuageux': Cloud, 'Pluie': CloudRain, 'Orage': CloudLightning, 'Vent': Wind };
            const Icon = icons[type] || Sun;
            return React.createElement(Icon, { className, size: 24 });
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [entries, setEntries] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [statsPeriod, setStatsPeriod] = useState('month');
            const [selectedWeekDay, setSelectedWeekDay] = useState(new Date().getDay() === 0 ? 6 : new Date().getDay() - 1);
            const [selectedEntry, setSelectedEntry] = useState(null);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                marketName: '', date: format(new Date(), 'yyyy-MM-dd'), weather: 'Soleil', kmTravelled: 0,
                startTime: '08:00', endTime: '13:00', cashGains: 0, cardGains: 0, expenses: 0,
                satisfaction: 3, tags: [], photoUrl: ''
            });

            useEffect(() => {
                return onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = query(collection(db, 'markets'), where('uid', '==', user.uid), orderBy('date', 'desc'));
                return onSnapshot(q, (snapshot) => {
                    setEntries(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            }, [user]);

            const stats = useMemo(() => {
                const now = new Date();
                let filtered = entries;
                if (statsPeriod === 'month') {
                    filtered = entries.filter(e => {
                        const d = parseISO(e.date);
                        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                    });
                } else if (statsPeriod === 'week') {
                    const start = startOfWeek(now, { weekStartsOn: 1 });
                    const end = endOfWeek(now, { weekStartsOn: 1 });
                    filtered = entries.filter(e => isWithinInterval(parseISO(e.date), { start, end }));
                }
                const totalGains = filtered.reduce((acc, curr) => acc + curr.cashGains + curr.cardGains, 0);
                const totalExpenses = filtered.reduce((acc, curr) => acc + curr.expenses, 0);
                const totalKm = filtered.reduce((acc, curr) => acc + curr.kmTravelled, 0);
                const fuelCost = totalKm * 0.20;
                const netProfit = totalGains - totalExpenses - fuelCost;
                const chartData = filtered.slice(0, 7).reverse().map(e => ({
                    name: format(parseISO(e.date), 'dd/MM'),
                    gains: e.cashGains + e.cardGains
                }));
                return { totalGains, totalExpenses, totalKm, fuelCost, netProfit, chartData };
            }, [entries, statsPeriod]);

            const weekEntriesByDay = useMemo(() => {
                const start = startOfWeek(new Date(), { weekStartsOn: 1 });
                const days = eachDayOfInterval({ start, end: endOfWeek(new Date(), { weekStartsOn: 1 }) });
                return days.map(day => entries.filter(e => isSameDay(parseISO(e.date), day)));
            }, [entries]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    if (editingId) {
                        await updateDoc(doc(db, 'markets', editingId), { ...formData, uid: user.uid, updatedAt: new Date().toISOString() });
                    } else {
                        await addDoc(collection(db, 'markets'), { ...formData, uid: user.uid, createdAt: new Date().toISOString() });
                    }
                    setFormData({ marketName: '', date: format(new Date(), 'yyyy-MM-dd'), weather: 'Soleil', kmTravelled: 0, startTime: '08:00', endTime: '13:00', cashGains: 0, cardGains: 0, expenses: 0, satisfaction: 3, tags: [], photoUrl: '' });

                    setActiveTab('dashboard');

            };

            const handleEdit = (entry) => {
                setFormData({ ...entry });
                setEditingId(entry.id);
                setSelectedEntry(null);
                setActiveTab('form');
            };

                if (confirm("Supprimer définitivement ?")) {
                    await deleteDoc(doc(db, 'markets', id));
                    setSelectedEntry(null);

                        "Connexion avec Google"
                    )

            );

            return (
                React.createElement('div', { className: "max-w-md mx-auto min-h-screen pb-32 pt-8 px-4" },
                    React.createElement('header', { className: "flex justify-between items-center mb-10" },

                            React.createElement('p', { className: "text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1" }, user.displayName)
                        ),
                        React.createElement('button', { onClick: () => signOut(auth), className: "p-2.5 bg-white/5 rounded-xl text-gray-500" }, React.createElement(LogOut, { size: 20 }))
                    ),

                    React.createElement(AnimatePresence, { mode: 'wait' },
                        activeTab === 'dashboard' && React.createElement(motion.div, { key: "dash", initial: { opacity: 0, y: 10 }, animate: { opacity: 1, y: 0 }, exit: { opacity: 0 }, className: "space-y-8" },
                            React.createElement('div', { className: "grid grid-cols-2 gap-4" },
                                React.createElement('div', { className: "glass p-6 rounded-[32px]" },
                                    React.createElement('p', { className: "text-[10px] text-gray-500 uppercase font-bold mb-1" }, "Bénéfice Net"),
                                    React.createElement('p', { className: "text-3xl font-black text-orange-500" }, stats.netProfit.toFixed(0), "€")
                                ),
                                React.createElement('div', { className: "glass p-6 rounded-[32px]" },
                                    React.createElement('p', { className: "text-[10px] text-gray-500 uppercase font-bold mb-1" }, "Distance"),
                                    React.createElement('p', { className: "text-3xl font-black" }, stats.totalKm, " km")
                                )
                            ),
                            React.createElement('div', { className: "glass p-6 rounded-[32px] space-y-6" },
                                React.createElement('div', { className: "flex justify-between items-center" },
                                    React.createElement('h3', { className: "text-xs font-bold uppercase tracking-widest text-gray-500" }, "Performance"),
                                    React.createElement('div', { className: "flex bg-black/40 p-1 rounded-xl" },
                                        ['week', 'month'].map(p => React.createElement('button', { key: p, onClick: () => setStatsPeriod(p), className: cn("px-3 py-1 text-[10px] font-bold rounded-lg uppercase", statsPeriod === p ? "bg-orange-500 text-white" : "text-gray-500") }, p === 'week' ? 'Sem' : 'Mois'))
                                    )
                                ),
                                React.createElement('div', { className: "h-48 w-full" },
                                    React.createElement(ResponsiveContainer, { width: "100%", height: "100%" },
                                        React.createElement(BarChart, { data: stats.chartData },
                                            React.createElement(XAxis, { dataKey: "name", hide: true }),
                                            React.createElement(Bar, { dataKey: "gains", radius: [6, 6, 0, 0] },
                                                stats.chartData.map((_, i) => React.createElement(Cell, { key: i, fill: i === stats.chartData.length - 1 ? '#f97316' : '#333' }))
                                            )
                                        )
                                    )
                                )
                            ),
                            React.createElement('div', { className: "space-y-4" },
                                React.createElement('div', { className: "flex justify-between items-center" },

                                    React.createElement('button', { onClick: () => setActiveTab('history'), className: "text-[10px] font-bold text-orange-500 uppercase" }, "Voir tout")

                                            React.createElement('div', null,
                                                React.createElement('p', { className: "font-bold text-lg" }, entry.marketName),
                                                React.createElement('p', { className: "text-[10px] text-gray-500 font-medium" }, format(parseISO(entry.date), 'dd MMM yyyy'))
                                            )
                                        ),
                                        React.createElement('div', { className: "flex items-center gap-4" },
                                            React.createElement('button', { onClick: (e) => { e.stopPropagation(); handleEdit(entry); }, className: "p-2 bg-white/5 rounded-xl text-gray-500" }, React.createElement(Edit, { size: 16 })),
                                            React.createElement('p', { className: "font-black text-orange-500 text-lg" }, (entry.cashGains + entry.cardGains - entry.expenses - (entry.kmTravelled * 0.2)).toFixed(0), "€")
                                        )
                                    )
                                )
                            )
                        ),

                        activeTab === 'week' && React.createElement(motion.div, { key: "week", initial: { opacity: 0 }, animate: { opacity: 1 }, className: "space-y-6" },
                            React.createElement('h2', { className: "text-3xl font-black" }, "Ma Semaine"),
                            React.createElement('div', { className: "flex gap-2 overflow-x-auto no-scrollbar pb-2" },
                                ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'].map((day, idx) => (
                                    React.createElement('button', { key: day, onClick: () => setSelectedWeekDay(idx), className: cn("flex-1 min-w-[50px] py-4 rounded-2xl border transition-all flex flex-col items-center gap-1", selectedWeekDay === idx ? "bg-orange-500 border-orange-500 text-white" : "glass text-gray-500") },
                                        React.createElement('span', { className: "text-[9px] font-bold uppercase" }, day),
                                        React.createElement('span', { className: "text-sm font-black" }, format(eachDayOfInterval({ start: startOfWeek(new Date(), { weekStartsOn: 1 }), end: endOfWeek(new Date(), { weekStartsOn: 1 }) })[idx], 'dd'))
                                    )
                                ))
                            ),
                            React.createElement('div', { className: "space-y-4" },
                                weekEntriesByDay[selectedWeekDay].length > 0 ? weekEntriesByDay[selectedWeekDay].map(entry => 
                                    React.createElement('div', { key: entry.id, onClick: () => setSelectedEntry(entry), className: "glass p-5 rounded-[32px] space-y-4 cursor-pointer" },
                                        React.createElement('div', { className: "flex justify-between items-start" },
                                            React.createElement('div', { className: "flex gap-4" },
                                                React.createElement('div', { className: "w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center" }, React.createElement(WeatherIcon, { type: entry.weather, className: "text-orange-500" })),
                                                React.createElement('div', null,
                                                    React.createElement('h4', { className: "font-bold text-lg" }, entry.marketName),
                                                    React.createElement('p', { className: "text-xs text-gray-500" }, entry.startTime, " - ", entry.endTime)
                                                )
                                            ),
                                            React.createElement('div', { className: "flex items-center gap-3" },
                                                React.createElement('button', { onClick: (e) => { e.stopPropagation(); handleEdit(entry); }, className: "p-2 bg-white/5 rounded-xl text-gray-500" }, React.createElement(Edit, { size: 18 })),
                                                React.createElement('div', { className: "text-right" },
                                                    React.createElement('p', { className: "text-xl font-black text-orange-500" }, "+", (entry.cashGains + entry.cardGains - entry.expenses - (entry.kmTravelled * 0.2)).toFixed(0), "€"),
                                                    React.createElement('p', { className: "text-[8px] text-gray-500 uppercase font-bold" }, "Net")
                                                )
                                            )
                                        )

                        activeTab === 'form' && React.createElement(motion.div, { key: "form", initial: { y: 20, opacity: 0 }, animate: { y: 0, opacity: 1 }, className: "space-y-8" },

                                React.createElement('h2', { className: "text-4xl font-black leading-tight" }, editingId ? "MODIFIER" : "NOUVEAU", React.createElement('br'), "MARCHÉ"),
